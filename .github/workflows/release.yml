name: Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.x'
      - run: flutter pub get
      - run: dart analyze
      - run: flutter test

  publish:
    needs: analyze
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    environment: publish
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.x'
      - name: Resolve dependencies
        run: |
          flutter pub get
          for pkg in packages/sanwo_*; do (cd "$pkg" && flutter pub get); done
      - name: Publish packages
        run: |
          publish_pkg() {
            local dir="$1"
            local name
            name="$(grep '^name:' "$dir/pubspec.yaml" | awk '{print $2}')"
            local version
            version="$(grep '^version:' "$dir/pubspec.yaml" | awk '{print $2}')"

            # Check if this version is already on pub.dev
            local status
            status=$(curl -s -o /dev/null -w "%{http_code}" "https://pub.dev/api/packages/$name/versions/$version")

            if [ "$status" = "200" ]; then
              echo "✓ $name@$version already published — skipping."
              return 0
            fi

            echo "→ Publishing $name@$version..."
            cd "$dir"
            flutter pub publish --force
            cd "$GITHUB_WORKSPACE"
            echo "✓ $name@$version published successfully!"
          }

          publish_pkg .
          publish_pkg packages/sanwo_paystack
          publish_pkg packages/sanwo_flutterwave
          publish_pkg packages/sanwo_razorpay
          publish_pkg packages/sanwo_monnify
          publish_pkg packages/sanwo_interswitch
