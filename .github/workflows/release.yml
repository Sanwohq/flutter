name: Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.x'
      - run: flutter pub get
      - run: dart analyze
      - run: flutter test

  publish:
    needs: analyze
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.x'
      - name: Resolve all dependencies
        run: |
          flutter pub get
          cd packages/sanwo_paystack && flutter pub get && cd ../..
          cd packages/sanwo_flutterwave && flutter pub get && cd ../..
          cd packages/sanwo_razorpay && flutter pub get && cd ../..
          cd packages/sanwo_monnify && flutter pub get && cd ../..
          cd packages/sanwo_interswitch && flutter pub get && cd ../..
      - uses: dart-lang/setup-dart@v1
      - name: Publish sanwo_flutter
        run: dart pub publish --force || echo "Already published or skipped"
      - name: Publish sanwo_paystack
        run: cd packages/sanwo_paystack && dart pub publish --force || echo "Already published or skipped"
      - name: Publish sanwo_flutterwave
        run: cd packages/sanwo_flutterwave && dart pub publish --force || echo "Already published or skipped"
      - name: Publish sanwo_razorpay
        run: cd packages/sanwo_razorpay && dart pub publish --force || echo "Already published or skipped"
      - name: Publish sanwo_monnify
        run: cd packages/sanwo_monnify && dart pub publish --force || echo "Already published or skipped"
      - name: Publish sanwo_interswitch
        run: cd packages/sanwo_interswitch && dart pub publish --force || echo "Already published or skipped"
