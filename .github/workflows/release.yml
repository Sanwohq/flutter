name: Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.x'
      - run: flutter pub get
      - run: dart analyze
      - run: flutter test

  publish:
    needs: analyze
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.x'
      - name: Resolve dependencies
        run: |
          flutter pub get
          for pkg in packages/sanwo_*; do (cd "$pkg" && flutter pub get); done
      - name: Publish all packages
        run: |
          set -e
          publish() {
            echo "--- Publishing from $1 ---"
            cd "$1"
            flutter pub publish --force
            cd "$GITHUB_WORKSPACE"
          }
          publish .
          publish packages/sanwo_paystack
          publish packages/sanwo_flutterwave
          publish packages/sanwo_razorpay
          publish packages/sanwo_monnify
          publish packages/sanwo_interswitch
